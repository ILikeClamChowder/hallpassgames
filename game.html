<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hall Pass</title>
  <meta name="description" content="Play instantly on Hall Pass — free browser games, no downloads." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://hallpassgames.com/game.html" />
  <meta name="theme-color" content="#0d1017" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Hall Pass" />
  <meta property="og:title" content="Hall Pass" />
  <meta property="og:description" content="Play instantly on Hall Pass — free browser games, no downloads." />
  <meta property="og:url" content="https://hallpassgames.com/game.html" />
  <meta property="og:image" content="https://hallpassgames.com/assets/og.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Hall Pass" />
  <meta name="twitter:description" content="Play instantly on Hall Pass — free browser games, no downloads." />
  <meta name="twitter:image" content="https://hallpassgames.com/assets/og.png" />
  <link rel="icon" href="assets/logo.svg" />
  <link rel="apple-touch-icon" href="assets/logo.svg" />
  <link rel="stylesheet" href="css/styles.css?v=45" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">
      <img class="brand-logo" src="assets/logo.svg" alt="" />
      <span class="brand-name">Hall<span class="accent"> Pass</span></span>
    </a>
    <nav class="nav">
      <a href="index.html">← All games</a>
    </nav>
  </header>

  <main class="player-main">
    <div class="player-bar">
      <div class="player-heading">
        <span class="player-cat" id="game-cat"></span>
        <h1 class="player-title" id="game-title">Loading…</h1>
        <p class="player-blurb" id="game-blurb"></p>
      </div>
      <button id="fullscreen" class="btn">⤢ Fullscreen</button>
    </div>
    <div class="player-frame" id="player-frame">
      <iframe id="game-frame" title="Game" allow="fullscreen; gamepad; autoplay"></iframe>
    </div>
    <p class="player-tip" id="game-tip"></p>
    <p class="player-fallback" id="game-fallback" hidden>
      Game not loading? A few games only run on their own site.
      <a id="game-fallback-link" target="_blank" rel="noopener">Open <span id="game-fallback-name">the game</span> ↗</a>
    </p>
    <p class="empty" id="game-missing" hidden>That game isn't here. <a href="index.html" style="color:var(--accent)">Back to all games →</a></p>

    <div class="ad-slot" data-ad="leaderboard" data-ad-label="Under game"></div>
  </main>

  <script src="js/catalog.js?v=45"></script>
  <script src="js/player.js?v=45"></script>
  <script src="js/ads.js?v=45"></script>
  <script src="js/disguise.js?v=2"></script>
</body>
</html>
