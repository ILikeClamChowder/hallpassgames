<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="Hall Pass logo">
  <!-- Hall Pass brand mark: a lanyard badge (the "pass") with a play button. -->
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6ea0ff"/>
      <stop offset="0.55" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#4a6ff0"/>
    </linearGradient>
  </defs>

  <!-- lanyard strap (chevron down to the clip) -->
  <path d="M38 10 L100 66 L162 10" fill="none" stroke="#2f4bc0" stroke-width="15" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- clip -->
  <rect x="91" y="58" width="18" height="20" rx="5" fill="#3f5fd6"/>

  <!-- badge card -->
  <rect x="33" y="70" width="134" height="140" rx="22" fill="url(#card)"/>
  <!-- top sheen -->
  <rect x="47" y="82" width="106" height="18" rx="9" fill="#ffffff" opacity="0.14"/>
  <!-- ID-card slot -->
  <rect x="84" y="90" width="32" height="8" rx="4" fill="#0d1017" opacity="0.42"/>

  <!-- play button (it's a games pass) -->
  <circle cx="100" cy="152" r="35" fill="#0d1730"/>
  <path d="M89 133 L120 152 L89 171 Z" fill="#7fd6a0"/>
</svg>
