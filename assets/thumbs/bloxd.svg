<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs><linearGradient id="blbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6fc3ff"/><stop offset="1" stop-color="#2a6db0"/></linearGradient></defs>
  <rect width="320" height="320" fill="url(#blbg)"/>
  <!-- grass ground blocks -->
  <g>
    <rect x="0" y="210" width="320" height="110" fill="#7a5133"/>
    <rect x="0" y="210" width="320" height="26" fill="#4caf50"/>
  </g>
  <!-- isometric block stack -->
  <g transform="translate(120,96)">
    <polygon points="60,0 112,28 60,56 8,28" fill="#63c862"/>
    <polygon points="8,28 60,56 60,116 8,88" fill="#7a5133"/>
    <polygon points="112,28 60,56 60,116 112,88" fill="#5c3d26"/>
  </g>
  <!-- floating block -->
  <g transform="translate(40,70)">
    <polygon points="34,0 64,16 34,32 4,16" fill="#ffce4a"/>
    <polygon points="4,16 34,32 34,58 4,42" fill="#c99a2e"/>
    <polygon points="64,16 34,32 34,58 64,42" fill="#e0b23c"/>
  </g>
</svg>
