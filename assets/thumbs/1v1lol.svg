<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs><linearGradient id="ovbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#243044"/><stop offset="1" stop-color="#141b28"/></linearGradient></defs>
  <rect width="320" height="320" fill="url(#ovbg)"/>
  <rect x="0" y="250" width="320" height="70" fill="#101623"/>
  <!-- build wall -->
  <g stroke="#3a5170" stroke-width="3" fill="#2a3a52">
    <rect x="150" y="120" width="120" height="120"/>
    <line x1="150" y1="160" x2="270" y2="160"/><line x1="150" y1="200" x2="270" y2="200"/>
    <line x1="190" y1="120" x2="190" y2="240"/><line x1="230" y1="120" x2="230" y2="240"/>
  </g>
  <!-- player -->
  <g transform="translate(70,120)">
    <rect x="6" y="34" width="40" height="60" rx="9" fill="#5b8cff"/>
    <circle cx="26" cy="20" r="18" fill="#ffd0a8"/>
    <rect x="14" y="4" width="24" height="12" rx="5" fill="#2f4bc0"/>
    <rect x="40" y="50" width="52" height="10" rx="4" fill="#2b333d" transform="rotate(-12 40 50)"/>
  </g>
  <text x="160" y="60" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="46" fill="#5b8cff">1v1</text>
</svg>
