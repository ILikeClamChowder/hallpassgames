  <text x="96" y="372" font-family="system-ui, Segoe UI, sans-serif" font-size="40" font-weight="500" fill="#9aa4bb">Your hall pass to every game.</text>
  <text x="96" y="430" font-family="ui-monospace, monospace" font-size="24" letter-spacing="3" fill="#6a7590">PLAY FREE · UNBLOCKED · NO DOWNLOADS</text>

