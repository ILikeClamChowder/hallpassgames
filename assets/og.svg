      <stop offset="0" stop-color="#111726"/><stop offset="1" stop-color="#080b12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.74" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#5b8cff" stop-opacity="0.35"/><stop offset="1" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
